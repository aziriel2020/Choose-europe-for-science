    // Shuffle array helper
    const shuffle = (array) => {
      let currentIndex = array.length, randomIndex;
      while (currentIndex > 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    };

    // ==========================================
    // MUSIC PLAYER & VISUALIZER COMPONENT
    // ==========================================
    function MusicPlayer() {
      const [playlist, setPlaylist] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isExpanded, setIsExpanded] = useState(false);
      const [progress, setProgress] = useState(0);
      const [volume, setVolume] = useState(0.7);
      
      const audioRef = useRef(null);
      const fileInputRef = useRef(null);
      
      const canvasRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);

      const handleFolderSelect = (e) => {
        const files = Array.from(e.target.files);
        const audioFiles = files.filter(file => file.type.startsWith('audio/') || file.name.endsWith('.mp3') || file.name.endsWith('.wav') || file.name.endsWith('.ogg'));
        
        if (audioFiles.length === 0) {
          alert("No music files found in the selected folder!");
          return;
        }

        const newPlaylist = audioFiles.map((file, index) => ({
          id: index,
          title: file.name.replace(/\.[^/.]+$/, ""),
          url: URL.createObjectURL(file)
        }));

        setPlaylist(newPlaylist);
        setCurrentIndex(0);
        setIsExpanded(true); 
      };

      const initVisualizer = () => {
        if (!audioContextRef.current && audioRef.current) {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; 
            
            const source = audioCtx.createMediaElementSource(audioRef.current);
            source.connect(analyser);
            analyser.connect(audioCtx.destination); 
            
            audioContextRef.current = audioCtx;
            analyserRef.current = analyser;
          } catch(err) {
            console.error("Audio Context Init Failed:", err);
          }
        }
        if (audioContextRef.current?.state === 'suspended') {
           audioContextRef.current.resume();
        }
      };

      const togglePlay = () => {
        if (playlist.length === 0) return;
        initVisualizer();
        
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play().catch(err => console.error("Playback failed:", err));
        }
        setIsPlaying(!isPlaying);
      };

      const playTrack = (index) => {
        initVisualizer();
        setCurrentIndex(index);
        setIsPlaying(true);
      };

      const nextTrack = () => {
        if (playlist.length === 0) return;
        setCurrentIndex((prev) => (prev + 1) % playlist.length);
        setIsPlaying(true);
      };

      const prevTrack = () => {
        if (playlist.length === 0) return;
        setCurrentIndex((prev) => (prev - 1 + playlist.length) % playlist.length);
        setIsPlaying(true);
      };

      useEffect(() => {
        if (audioRef.current && playlist.length > 0) {
          audioRef.current.src = playlist[currentIndex].url;
          audioRef.current.volume = volume;
          if (isPlaying) {
            audioRef.current.play().catch(err => {
              console.error("Autoplay prevented:", err);
              setIsPlaying(false);
            });
          }
        }
      }, [currentIndex, playlist]);

      useEffect(() => {
        let animationId;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const draw = () => {
          animationId = requestAnimationFrame(draw);
          
          if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }

          if (!isPlaying || !analyserRef.current) {
             ctx.clearRect(0, 0, canvas.width, canvas.height);
             return;
          }

          const analyser = analyserRef.current;
          const bufferLength = analyser.frequencyBinCount;
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteFrequencyData(dataArray);

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const barWidth = (canvas.width / bufferLength) * 2;
          let barHeight;
          let x = 0;

          for (let i = 0; i < bufferLength; i++) {
            barHeight = (dataArray[i] / 255) * canvas.height * 0.5; 

            const r = 99 + (dataArray[i] / 2);
            const g = 102 + (i * 2);
            const b = 241;

            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.2)`; 
            ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
            
            x += barWidth;
          }
        };
        
        draw();
        return () => cancelAnimationFrame(animationId);
      }, [isPlaying]);

      const handleTimeUpdate = () => {
        if (audioRef.current && audioRef.current.duration) {
          const p = (audioRef.current.currentTime / audioRef.current.duration) * 100;
          setProgress(p);
        }
      };

      const handleVolumeChange = (e) => {
        const v = parseFloat(e.target.value);
        setVolume(v);
        if (audioRef.current) audioRef.current.volume = v;
      };

      const handleProgressBarClick = (e) => {
        if (!audioRef.current || playlist.length === 0) return;
        const bar = e.currentTarget;
        const rect = bar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const newTime = (clickX / rect.width) * audioRef.current.duration;
        audioRef.current.currentTime = newTime;
      };

      const formatTime = (timeInSeconds) => {
        if (isNaN(timeInSeconds)) return "0:00";
        const m = Math.floor(timeInSeconds / 60);
        const s = Math.floor(timeInSeconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      return (
        <>
          <canvas ref={canvasRef} className="fixed inset-0 w-full h-full pointer-events-none z-0 opacity-80" />
          
          <div className={`fixed bottom-6 left-6 z-50 transition-all duration-300 ease-in-out ${isExpanded ? 'w-80' : 'w-64'}`}>
            <audio 
              ref={audioRef} 
              onTimeUpdate={handleTimeUpdate} 
              onEnded={nextTrack}
              crossOrigin="anonymous"
              className="hidden" 
            />
            <input 
              type="file" 
              ref={fileInputRef} 
              onChange={handleFolderSelect} 
              webkitdirectory="true" 
              directory="true" 
              multiple 
              className="hidden" 
            />

            <div className="glass-card shadow-2xl rounded-2xl overflow-hidden flex flex-col group relative z-50">
              <div 
                className="p-4 flex items-center justify-between cursor-pointer bg-gradient-to-r from-indigo-50/50 to-blue-50/50 border-b border-slate-200/30 hover:bg-indigo-100/50 transition-colors"
                onClick={() => setIsExpanded(!isExpanded)}
              >
                <div className="flex items-center gap-3">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white ${isPlaying ? 'bg-indigo-500 animate-pulse' : 'bg-slate-300'}`}>
                    <i className="fas fa-music text-sm"></i>
                  </div>
                  <div className="flex flex-col">
                    <span className="text-sm font-bold text-slate-800 truncate w-32">
                      {playlist.length > 0 ? playlist[currentIndex].title : "Music Player"}
                    </span>
                    <span className="text-[10px] text-slate-500 uppercase font-bold">
                      {playlist.length > 0 ? `Track ${currentIndex + 1} of ${playlist.length}` : "No folder loaded"}
                    </span>
                  </div>
                </div>
                <button className="text-slate-400 hover:text-indigo-600 transition-colors">
                  <i className={`fas fa-chevron-${isExpanded ? 'down' : 'up'}`}></i>
                </button>
              </div>

              {isExpanded && (
                <div className="flex flex-col">
                  <div className="h-48 overflow-y-auto playlist-scroll p-2 bg-slate-50/30">
                    {playlist.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-slate-400 p-4 text-center">
                        <i className="fas fa-folder-open text-3xl mb-2 opacity-50"></i>
                        <p className="text-xs font-medium">Click "Load 'musics' Folder" below to retrieve your songs!</p>
                      </div>
                    ) : (
                      playlist.map((track, i) => (
                        <div 
                          key={track.id} 
                          onClick={() => playTrack(i)}
                          className={`px-3 py-2 rounded-lg text-sm cursor-pointer mb-1 transition-colors flex items-center gap-3
                            ${currentIndex === i 
                              ? 'bg-indigo-100/80 text-indigo-700 font-bold border border-indigo-200/50' 
                              : 'hover:bg-white/50 text-slate-600 border border-transparent hover:border-slate-200/50'}`}
                        >
                          <span className="opacity-50 text-xs w-4 text-right">{i + 1}.</span>
                          <span className="truncate">{track.title}</span>
                          {currentIndex === i && isPlaying && (
                            <i className="fas fa-volume-up text-indigo-500 ml-auto animate-pulse"></i>
                          )}
                        </div>
                      ))
                    )}
                  </div>

                  <div className="p-4 bg-white/50">
                    <div className="mb-4">
                      <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                        <span>{audioRef.current ? formatTime(audioRef.current.currentTime) : "0:00"}</span>
                        <span>{audioRef.current && audioRef.current.duration ? formatTime(audioRef.current.duration) : "0:00"}</span>
                      </div>
                      <div 
                        className="h-2 bg-slate-200/50 rounded-full cursor-pointer relative overflow-hidden"
                        onClick={handleProgressBarClick}
                      >
                        <div 
                          className="h-full bg-gradient-to-r from-indigo-500 to-blue-500 absolute top-0 left-0 rounded-full pointer-events-none transition-all duration-150"
                          style={{ width: `${progress}%` }}
                        ></div>
                      </div>
                    </div>

                    <div className="flex items-center justify-between">
                      <button 
                        onClick={() => fileInputRef.current.click()} 
                        className="text-slate-400 hover:text-indigo-600 transition-colors tooltip"
                        title="Load 'musics' folder"
                      >
                        <i className="fas fa-folder-plus text-lg"></i>
                      </button>
                      
                      <div className="flex items-center gap-4">
                        <button onClick={prevTrack} className="text-slate-600 hover:text-indigo-600 transition-transform hover:scale-110 disabled:opacity-30" disabled={playlist.length === 0}>
                          <i className="fas fa-backward-step text-lg"></i>
                        </button>
                        
                        <button 
                          onClick={togglePlay} 
                          className="w-12 h-12 flex items-center justify-center bg-indigo-600 text-white rounded-full hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all hover:scale-105 disabled:opacity-50 disabled:hover:scale-100"
                          disabled={playlist.length === 0}
                        >
                          <i className={`fas fa-${isPlaying ? 'pause' : 'play'} text-xl ml-${isPlaying ? '0' : '1'}`}></i>
                        </button>
                        
                        <button onClick={nextTrack} className="text-slate-600 hover:text-indigo-600 transition-transform hover:scale-110 disabled:opacity-30" disabled={playlist.length === 0}>
                          <i className="fas fa-forward-step text-lg"></i>
                        </button>
                      </div>

                      <div className="relative group/vol">
                        <button className="text-slate-400 hover:text-indigo-600 transition-colors">
                          <i className={`fas fa-volume-${volume === 0 ? 'mute' : volume < 0.5 ? 'down' : 'up'} text-lg`}></i>
                        </button>
                        <div className="absolute bottom-full right-0 mb-2 p-2 glass-card rounded-lg shadow-xl border border-slate-100 opacity-0 invisible group-hover/vol:opacity-100 group-hover/vol:visible transition-all">
                          <input 
                            type="range" 
                            min="0" max="1" step="0.05" 
                            value={volume} 
                            onChange={handleVolumeChange}
                            className="w-24 accent-indigo-500"
                          />
                        </div>
                      </div>
                    </div>
                    
                    {playlist.length === 0 && (
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className="w-full mt-4 py-2 bg-slate-100/80 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-sm transition-colors flex items-center justify-center gap-2"
                      >
                        <i className="fas fa-upload"></i> Load 'musics' Folder
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    // --- Shared Language Switcher ---
    const LanguageSwitcher = ({ lang, setLang }) => (
      <div className="absolute top-4 right-4 z-[70] flex items-center gap-2 glass-card px-3 py-2 rounded-xl shadow-sm transition-all hover:shadow-md">
        <i className="fas fa-globe text-indigo-500"></i>
        <select 
          value={lang} 
          onChange={(e) => setLang(e.target.value)}
          className="bg-transparent font-bold text-slate-700 outline-none cursor-pointer text-sm"
        >
          {Object.entries(i18n).map(([code, data]) => (
            <option key={code} value={code}>{data.name}</option>
          ))}
        </select>
      </div>
    );

    function App() {
      // --- State ---
      const [lang, setLang] = useState('en'); 
      const [gameState, setGameState] = useState('login'); // login, playing, results
      const [username, setUsername] = useState('');
      
      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isRevealing, setIsRevealing] = useState(false);
      
      const [score, setScore] = useState(0);
      const [time, setTime] = useState(0);
      const [leaderboard, setLeaderboard] = useState([]);
      const [toast, setToast] = useState(null);
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [pwdInput, setPwdInput] = useState('');

      const t = i18n[lang] || i18n['en'];

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      };

      // --- Initialization & Local Storage ---
      useEffect(() => {
        const saved = localStorage.getItem('chooseEuropeQuizLeaderboard');
        if (saved) {
          try {
            setLeaderboard(JSON.parse(saved));
          } catch (e) {
            console.error("Failed to parse local leaderboard.");
          }
        }
      }, []);

      const setupGame = () => {
        const shuffled = shuffle([...ITEMS_CONFIG]);
        setQuestions(shuffled);
        setCurrentQIndex(0);
        setScore(0);
        setTime(0);
        setSelectedAnswer(null);
        setIsRevealing(false);
        setGameState('playing');
      };

      const handleStartGame = (e) => {
        e.preventDefault();
        if (!username.trim()) return;
        setupGame();
      };

      // --- Timer ---
      useEffect(() => {
        let interval;
        if (gameState === 'playing') {
          interval = setInterval(() => {
            setTime((prevTime) => prevTime + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [gameState]);

      const formatTime = (seconds) => {
        const getSeconds = `0${(seconds % 60)}`.slice(-2);
        const minutes = `${Math.floor(seconds / 60)}`;
        const getMinutes = `0${minutes % 60}`.slice(-2);
        return `${getMinutes}:${getSeconds}`;
      };

      // --- Quiz Interaction Logic ---
      const handleAnswer = (categoryId) => {
        if (isRevealing) return; // Lock input
        
        setSelectedAnswer(categoryId);
        setIsRevealing(true);
        
        const currentQ = questions[currentQIndex];
        const isCorrect = categoryId === currentQ.target;
        
        if (isCorrect) {
          setScore(prev => prev + 1);
        }

        // Auto-advance after animation
        setTimeout(() => {
          if (currentQIndex + 1 < questions.length) {
            setCurrentQIndex(prev => prev + 1);
            setSelectedAnswer(null);
            setIsRevealing(false);
          } else {
            endGame(isCorrect ? score + 1 : score);
          }
        }, 1500);
      };

      const endGame = (finalScore) => {
        setGameState('results');
        
        const newEntry = {
          id: Date.now(),
          username: username.trim(),
          score: finalScore,
          time: time,
          total: questions.length
        };
        
        setLeaderboard(prev => {
          const updated = [...prev, newEntry];
          const sorted = updated.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return a.time - b.time;
          }).slice(0, 10); 
          
          localStorage.setItem('chooseEuropeQuizLeaderboard', JSON.stringify(sorted));
          return sorted;
        });
      };

      // --- File System Operations ---
      const exportLeaderboard = () => {
        if (leaderboard.length === 0) {
          showToast("Leaderboard is empty! Play a game first.");
          return;
        }
        const blob = new Blob([JSON.stringify(leaderboard, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quiz_leaderboard.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("Leaderboard exported to file! 💾");
      };

      const importLeaderboard = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (Array.isArray(importedData)) {
              setLeaderboard(importedData);
              localStorage.setItem('chooseEuropeQuizLeaderboard', JSON.stringify(importedData));
              showToast("Leaderboard imported successfully! 🚀");
            } else {
              showToast("Invalid file format.");
            }
          } catch (err) {
            showToast("Error reading the JSON file.");
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const clearLeaderboard = () => {
        setShowPwdModal(true);
        setPwdInput('');
      };

      const confirmClear = () => {
        if (pwdInput === "rtdf4") {
          setLeaderboard([]);
          localStorage.removeItem('chooseEuropeQuizLeaderboard');
          showToast("Leaderboard cleared! 🗑️");
          setShowPwdModal(false);
        } else {
          showToast("Incorrect password. ❌");
          setShowPwdModal(false);
        }
      };


      // --- RENDER MAIN LAYOUT ---
      return (
        <div className="min-h-screen text-slate-800 font-sans flex flex-col relative pb-32 overflow-x-hidden bg-slate-50">
          
          <LanguageSwitcher lang={lang} setLang={setLang} />
          
          {toast && (
            <div className="fixed bottom-6 right-6 bg-slate-800 text-white font-medium px-6 py-3 rounded-xl shadow-2xl z-50 transition-all duration-300">
              {toast}
            </div>
          )}

          {showPwdModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[80] flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Clear Leaderboard</h3>
                <p className="text-sm text-slate-500 mb-4">Enter password to clear all saved scores:</p>
                <input 
                  type="password" 
                  value={pwdInput} 
                  onChange={e => setPwdInput(e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl mb-6 focus:ring-2 focus:ring-rose-400 outline-none"
                  placeholder="Password"
                  autoFocus
                  onKeyDown={e => e.key === 'Enter' && confirmClear()}
                />
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowPwdModal(false)} className="px-4 py-2 rounded-lg font-semibold text-slate-500 hover:bg-slate-100 transition-colors">Cancel</button>
                  <button onClick={confirmClear} className="px-4 py-2 rounded-lg font-semibold bg-rose-500 text-white hover:bg-rose-600 transition-colors">Confirm</button>
                </div>
              </div>
            </div>
          )}

          <MusicPlayer />

          {/* LOGIN SCREEN */}
          {gameState === 'login' ? (
            <div className="flex-grow flex items-center justify-center p-4 relative z-10">
              <div className="glass-card p-8 rounded-3xl shadow-2xl max-w-md w-full border border-white/60 transform transition-all duration-500 animate-in zoom-in-95 fade-in">
                <div className="text-center mb-8">
                  <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-500/30 rotate-3">
                    <i className="fas fa-brain text-4xl"></i>
                  </div>
                  <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-600 leading-tight pb-1">
                    {t.ui.title}
                  </h1>
                  <p className="text-slate-600 mt-3 font-medium text-lg">{t.ui.subtitle}</p>
                </div>
                <form onSubmit={handleStartGame} className="space-y-6">
                  <div>
                    <input
                      type="text"
                      value={username}
                      onChange={(e) => setUsername(e.target.value)}
                      placeholder={t.ui.pseudoPlaceholder}
                      className="w-full px-6 py-4 bg-white/60 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 focus:bg-white outline-none transition-all text-slate-700 font-bold text-lg placeholder:text-slate-400 shadow-sm"
                      maxLength={15}
                      required
                    />
                  </div>
                  <button
                    type="submit"
                    disabled={!username.trim()}
                    className="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-indigo-600 to-blue-600 text-white px-8 py-5 rounded-2xl font-extrabold text-xl hover:shadow-2xl hover:shadow-indigo-500/40 hover:-translate-y-1 active:translate-y-0 transition-all disabled:opacity-50 disabled:cursor-not-allowed group"
                  >
                    <i className="fas fa-play group-hover:scale-110 transition-transform"></i> {t.ui.startPlaying}
                  </button>
                </form>
              </div>
            </div>
            
          // QUIZ SCREEN
          ) : gameState === 'playing' ? (
            <div className="flex-grow flex flex-col p-4 md:p-8 relative z-10 w-full max-w-5xl mx-auto animate-in fade-in duration-700">
              
              {/* Header */}
              <header className="w-full flex flex-col md:flex-row justify-between items-center mb-8 gap-4 glass-card p-4 md:px-8 rounded-2xl shadow-lg mt-12 md:mt-0">
                <div>
                  <h1 className="text-xl md:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-600">
                    {t.ui.title}
                  </h1>
                  <div className="flex items-center gap-3 mt-1">
                    <p className="text-slate-500 font-medium text-sm flex items-center gap-2">
                      <i className="fas fa-user text-sm text-indigo-400"></i> {t.ui.playingAs} <strong className="text-indigo-700">{username}</strong>
                    </p>
                    <button 
                      onClick={() => { setGameState('login'); setUsername(''); }}
                      className="text-[10px] bg-white/80 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded-md border border-slate-300 transition-colors"
                      title="Change Player"
                    >
                      <i className="fas fa-user-edit"></i>
                    </button>
                  </div>
                </div>
                
                <div className="flex items-center gap-6">
                  <div className="flex items-center gap-2 bg-white/80 border border-slate-200 px-5 py-2 rounded-xl font-mono text-xl font-bold text-slate-700 shadow-sm">
                    <i className="fas fa-clock text-indigo-500"></i>
                    {formatTime(time)}
                  </div>
                  <button
                    onClick={setupGame}
                    className="flex items-center gap-2 hover:bg-rose-50 hover:text-rose-600 text-slate-500 px-4 py-2 rounded-xl transition-colors font-bold text-sm"
                  >
                    <i className="fas fa-rotate-left"></i> {t.ui.reset}
                  </button>
                </div>
              </header>

              {/* Quiz Main Area */}
              <main className="w-full flex-grow flex flex-col items-center justify-center gap-8">
                
                {/* Progress & Score Bar */}
                <div className="w-full max-w-4xl">
                  <div className="flex justify-between items-end mb-3 px-2">
                    <span className="text-sm font-extrabold text-slate-400 uppercase tracking-widest">
                      {t.ui.question} <span className="text-indigo-600 text-lg">{currentQIndex + 1}</span> / {questions.length}
                    </span>
                    <span className="text-sm font-extrabold text-slate-400 uppercase tracking-widest">
                      {t.ui.score}: <span className="text-emerald-500 text-lg">{score}</span>
                    </span>
                  </div>
                  <div className="w-full h-4 bg-slate-200/80 rounded-full overflow-hidden shadow-inner border border-slate-300/50">
                    <div 
                      className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500 ease-out relative"
                      style={{ width: `${(currentQIndex / questions.length) * 100}%` }}
                    >
                      <div className="absolute inset-0 bg-white/20 w-full h-full" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent)', backgroundSize: '1rem 1rem' }}></div>
                    </div>
                  </div>
                </div>

                {/* The Interactive Question Card */}
                {questions.length > 0 && (
                  <div className="glass-card w-full max-w-4xl rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
                    {/* Decorative Background Elements inside card */}
                    <div className="absolute -top-24 -right-24 w-64 h-64 bg-indigo-400/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-purple-400/10 rounded-full blur-3xl pointer-events-none"></div>

                    {/* The Question (Item) */}
                    <div className="text-center mb-12 relative z-10">
                      <h2 
                        key={currentQIndex} // Forces re-animation on question change
                        className="text-3xl md:text-5xl font-black text-slate-800 leading-tight drop-shadow-sm animate-in slide-in-from-bottom-4 fade-in duration-500"
                      >
                        "{t.items[questions[currentQIndex].id]}"
                      </h2>
                    </div>

                    {/* The 4 Category Buttons */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 relative z-10">
                      {CATEGORIES_CONFIG.map((cat, idx) => {
                        const isSelected = selectedAnswer === cat.id;
                        const isCorrectAnswer = cat.id === questions[currentQIndex].target;
                        
                        let btnClasses = "bg-white border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-indigo-300 hover:shadow-lg hover:-translate-y-1";
                        let icon = null;

                        if (isRevealing) {
                          if (isCorrectAnswer) {
                            btnClasses = "bg-gradient-to-r from-emerald-400 to-emerald-500 border-emerald-400 text-white pulse-glow-green scale-[1.02] shadow-xl z-20";
                            icon = <i className="fas fa-check-circle text-3xl absolute right-6 opacity-80 animate-in zoom-in"></i>;
                          } else if (isSelected && !isCorrectAnswer) {
                            btnClasses = "bg-gradient-to-r from-rose-400 to-rose-500 border-rose-400 text-white animate-shake shadow-lg z-20";
                            icon = <i className="fas fa-times-circle text-3xl absolute right-6 opacity-80"></i>;
                          } else {
                            btnClasses = "bg-white border-slate-200 text-slate-400 opacity-40 scale-95 grayscale";
                          }
                        }

                        return (
                          <button
                            key={cat.id}
                            onClick={() => handleAnswer(cat.id)}
                            disabled={isRevealing}
                            className={`relative w-full p-6 md:p-8 rounded-3xl border-2 font-bold transition-all duration-300 flex flex-col items-center justify-center gap-2 text-center group ${btnClasses}`}
                            style={{ animationDelay: `${idx * 50}ms` }} // Staggered intro if we added intro animation
                          >
                            <span className={`text-xl md:text-2xl drop-shadow-sm ${isRevealing && (isCorrectAnswer || isSelected) ? 'text-white' : 'text-slate-800'}`}>
                              {t.cats[cat.id].title}
                            </span>
                            <span className={`text-xs md:text-sm font-semibold uppercase tracking-widest opacity-80 ${isRevealing && (isCorrectAnswer || isSelected) ? 'text-white' : 'text-slate-500'}`}>
                              {t.cats[cat.id].subtitle}
                            </span>
                            {/* Visual Category Color Hint (only when not revealing) */}
                            {!isRevealing && (
                              <div className={`absolute top-0 left-0 w-full h-1.5 rounded-t-3xl bg-gradient-to-r ${cat.color} opacity-80`}></div>
                            )}
                            {icon}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </main>
            </div>
            
          // RESULTS SCREEN
          ) : (
            <div className="flex-grow flex flex-col items-center p-4 md:p-8 relative z-10 w-full max-w-7xl mx-auto mt-8 animate-in slide-in-from-bottom-8 fade-in duration-700">
              
              <div className="w-full flex flex-col lg:flex-row gap-8 items-start">
                {/* Results Card */}
                <div className="glass-card p-10 md:p-12 rounded-[2.5rem] shadow-2xl border border-white flex-1 w-full flex flex-col items-center text-center">
                  
                  {score === questions.length ? (
                    <div className="w-24 h-24 bg-gradient-to-br from-yellow-300 to-amber-500 rounded-full flex items-center justify-center shadow-xl shadow-amber-500/40 mb-6 animate-bounce">
                      <i className="fas fa-crown text-4xl text-white"></i>
                    </div>
                  ) : (
                    <div className="w-24 h-24 bg-gradient-to-br from-indigo-400 to-blue-500 rounded-full flex items-center justify-center shadow-xl shadow-blue-500/40 mb-6">
                      <i className="fas fa-check-double text-4xl text-white"></i>
                    </div>
                  )}

                  <h3 className="text-3xl font-black text-slate-800 mb-2">{t.ui.yourResults}</h3>
                  <div className="text-7xl md:text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-4 drop-shadow-sm">
                    {score} <span className="text-4xl text-slate-300">/ {questions.length}</span>
                  </div>
                  
                  <div className="bg-slate-100/80 px-6 py-3 rounded-2xl font-bold text-slate-600 flex items-center gap-3 mb-8 shadow-inner border border-slate-200">
                    <i className="fas fa-stopwatch text-indigo-500 text-xl"></i> 
                    {t.ui.time}: {formatTime(time)}
                  </div>
                  
                  <p className="text-lg text-slate-600 font-medium mb-10 max-w-md leading-relaxed">
                    {score === questions.length ? t.ui.perfect : t.ui.goodEffort}
                  </p>
                  
                  <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                    <button
                      onClick={setupGame}
                      className="flex items-center justify-center gap-3 bg-gradient-to-r from-slate-800 to-slate-900 text-white px-8 py-4 rounded-full font-bold text-lg hover:shadow-2xl hover:shadow-slate-800/40 hover:-translate-y-1 active:translate-y-0 w-full sm:w-auto transition-all"
                    >
                      <i className="fas fa-rotate-left"></i> {t.ui.playAgain}
                    </button>
                    <button
                      onClick={() => { setGameState('login'); setUsername(''); }}
                      className="flex items-center justify-center gap-3 bg-white text-indigo-600 border-2 border-indigo-100 px-8 py-4 rounded-full font-bold text-lg hover:bg-indigo-50 hover:border-indigo-300 hover:shadow-lg hover:-translate-y-1 active:translate-y-0 w-full sm:w-auto transition-all"
                    >
                      <i className="fas fa-user-edit"></i> {t.ui.changePlayer}
                    </button>
                  </div>
                </div>

                {/* Leaderboard Card */}
                <div className="glass-card rounded-[2.5rem] shadow-2xl border border-white flex-1 w-full overflow-hidden flex flex-col">
                  <div className="bg-gradient-to-r from-slate-50/90 to-white/90 p-8 border-b border-slate-200/50 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-gradient-to-br from-amber-200 to-orange-400 text-white rounded-2xl shadow-lg shadow-amber-500/30">
                        <i className="fas fa-trophy text-2xl"></i>
                      </div>
                      <div>
                        <h3 className="text-2xl font-black text-slate-800">{t.ui.localLeaderboard}</h3>
                        <p className="text-sm text-slate-500 font-bold uppercase tracking-wider">{t.ui.savedOnDevice}</p>
                      </div>
                    </div>
                    
                    {/* Controls */}
                    <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                      <button onClick={clearLeaderboard} className="flex-1 sm:flex-none text-xs flex items-center justify-center gap-2 bg-white/80 border border-rose-200 hover:bg-rose-50 text-rose-600 px-4 py-2 rounded-xl transition-all font-bold shadow-sm hover:shadow-md hover:-translate-y-0.5">
                        <i className="fas fa-trash"></i> {t.ui.clear}
                      </button>
                      <button onClick={exportLeaderboard} className="flex-1 sm:flex-none text-xs flex items-center justify-center gap-2 bg-white/80 border border-slate-200 hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-xl transition-all font-bold shadow-sm hover:shadow-md hover:-translate-y-0.5">
                        <i className="fas fa-download"></i> {t.ui.export}
                      </button>
                      <label className="flex-1 sm:flex-none text-xs flex items-center justify-center gap-2 bg-white/80 border border-slate-200 hover:bg-slate-50 text-slate-600 px-4 py-2 rounded-xl transition-all font-bold shadow-sm hover:shadow-md hover:-translate-y-0.5 cursor-pointer">
                        <i className="fas fa-upload"></i> {t.ui.import}
                        <input type="file" accept=".json" onChange={importLeaderboard} className="hidden" />
                      </label>
                    </div>
                  </div>

                  <div className="p-0 overflow-x-auto flex-grow">
                    <table className="w-full text-left border-collapse min-w-[400px]">
                      <thead>
                        <tr className="bg-slate-50/50 text-slate-400 text-xs uppercase tracking-widest font-black">
                          <th className="py-4 px-8">{t.ui.rank}</th>
                          <th className="py-4 px-8">{t.ui.player}</th>
                          <th className="py-4 px-8 text-right">{t.ui.score}</th>
                          <th className="py-4 px-8 text-right">{t.ui.time}</th>
                        </tr>
                      </thead>
                      <tbody>
                        {leaderboard.length === 0 ? (
                          <tr><td colSpan="4" className="text-center py-12 text-slate-400 font-bold">{t.ui.noScores}</td></tr>
                        ) : leaderboard.map((entry, index) => (
                          <tr key={entry.id} className="border-t border-slate-100/50 hover:bg-white/60 transition-colors group">
                            <td className="py-5 px-8">
                              <span className={`
                                inline-flex items-center justify-center w-10 h-10 rounded-2xl font-black text-sm shadow-sm transition-transform group-hover:scale-110
                                ${index === 0 ? 'bg-gradient-to-br from-yellow-300 to-amber-500 text-white shadow-amber-500/40' : 
                                  index === 1 ? 'bg-gradient-to-br from-slate-300 to-slate-400 text-white shadow-slate-500/30' : 
                                  index === 2 ? 'bg-gradient-to-br from-orange-300 to-orange-400 text-white shadow-orange-500/30' : 'bg-slate-100 text-slate-500'}
                              `}>
                                #{index + 1}
                              </span>
                            </td>
                            <td className="py-5 px-8 font-extrabold text-slate-700 text-lg">{entry.username}</td>
                            <td className="py-5 px-8 text-right font-black text-indigo-600 text-xl">{entry.score}<span className="text-sm text-slate-400">/{entry.total}</span></td>
                            <td className="py-5 px-8 text-right text-slate-500 font-mono font-bold text-lg">{formatTime(entry.time)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
